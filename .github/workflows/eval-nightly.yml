name: eval-nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  full-eval:
    runs-on: ubuntu-latest
    # Stub until TIP-009 implements the runner — failures must not block
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python evals/runner.py --suite full
